<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScRiBe Elite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .brand { font-size: 18px; letter-spacing: 5px; text-transform: uppercase; flex: 1; text-align: center; }
        nav.top-links { display: flex; justify-content: center; gap: 15px; font-size: 10px; text-transform: uppercase; padding: 15px 0; border-bottom: 1px solid #111; }
        nav.top-links span { cursor: pointer; color: #444; padding: 5px; }
        nav.top-links span.active { color: #fff; border-bottom: 1px solid #fff; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #target-header { font-size: 11px; letter-spacing: 2px; color: #ffd700; margin-bottom: 15px; text-transform: uppercase; text-align: center; min-height: 20px; }
        .team-toggle { display: flex; width: 100%; max-width: 400px; background: #222; margin-bottom: 15px; }
        .team-btn { flex: 1; padding: 12px; background: #000; border: none; color: #444; font-size: 10px; text-transform: uppercase; cursor: pointer; }
        .team-btn.active { color: #fff; background: #111; }
        .score-card { border: 1px solid #333; padding: 25px 20px; width: 100%; max-width: 400px; text-align: center; background: #050505; }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; font-size: 10px; color: #555; }
        .over-history { display: flex; gap: 8px; margin-bottom: 15px; height: 30px; justify-content: center; align-items: center; }
        .ball { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 9px; }
        .ball-w { color: #ff4d4d; border-color: #631c1c; font-weight: bold; }
        .score-display { font-size: 72px; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #222; width: 100%; max-width: 400px; }
        .btn-grid button { background: #000; color: #fff; border: none; padding: 20px; font-size: 20px; cursor: pointer; }
        .extra-btns { display: flex; width: 100%; max-width: 400px; gap: 5px; margin-top: 10px; }
        .extra-btns button { flex: 1; background: #111; border: 1px solid #222; color: #666; padding: 12px; font-size: 9px; cursor: pointer; }
        .match-input { width: 50%; background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; font-size: 10px; padding: 8px; text-align: center; outline:none; }
        #sidebar { position: fixed; top: 0; left: -100%; width: 260px; height: 100%; background: #0a0a0a; z-index: 3000; transition: 0.3s; padding: 40px 20px; border-right: 1px solid #222; }
        #sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 2000; }
        .overlay.active { display: block; }
        .menu-btn { width: 100%; background: #111; color: #fff; padding: 14px; border: 1px solid #333; font-size: 10px; margin-bottom: 12px; text-align: left; cursor: pointer; }
    </style>
</head>
<body>
    <header><div onclick="toggleSidebar()" style="cursor:pointer">☰</div><div class="brand">ScRiBe</div><div style="width:20px"></div></header>
    <nav class="top-links">
        <span id="nav-Test" class="active" onclick="setMode('Test')">Test</span>
        <span id="nav-T20" onclick="setMode('T20')">T20</span>
        <span id="nav-ODI" onclick="setMode('ODI')">ODI</span>
    </nav>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <h2 style="font-size:12px; margin-bottom:20px; letter-spacing:2px; color:#444">LEDGER</h2>
        <button class="menu-btn" onclick="tossCoin()">🪙 FLIP COIN (50/50)</button>
        <div id="toss-display" style="text-align:center; color:#ffd700; font-size:10px; margin-bottom:10px"></div>
        <hr style="border:0.5px solid #222; margin: 20px 0;">
        <button class="menu-btn" onclick="resetAll()">New Match</button>
        <button class="menu-btn" onclick="toggleSidebar()">Close</button>
    </div>
    <div class="container">
        <div id="target-header">READY TO PLAY</div>
        <div class="team-toggle">
            <button id="t1-btn" class="team-btn active" onclick="setTeam(1)">Team A</button>
            <button id="t2-btn" class="team-btn" onclick="setTeam(2)">Team B</button>
        </div>
        <div class="score-card">
            <div class="stats-bar"><span id="crr-ui"></span><span id="ovs-ui">Overs: 0.0</span><span id="rrr-ui"></span></div>
            <div id="ticker-ui" class="over-history"></div>
            <div id="score-ui" class="score-display">0-0</div>
            <div class="btn-grid">
                <button onclick="add(1)">1</button><button onclick="add(2)">2</button><button onclick="add(3)">3</button>
                <button onclick="add(4)">4</button><button onclick="add(6)">6</button><button onclick="add(0)">0</button>
                <button onclick="wicket()" style="grid-column:span 3; color:#631c1c; font-size:14px; letter-spacing:3px">WICKET</button>
            </div>
        </div>
        <div class="extra-btns">
            <button onclick="extra('WD')">WD</button><button onclick="extra('NB')">NB</button><button onclick="extra('BYE')">BYE</button><button onclick="undo()" style="color:#fff">Undo</button>
        </div>
        <div style="display:flex; width:100%; max-width:400px; margin-top:20px">
            <input type="text" id="n1" class="match-input" placeholder="TEAM A" oninput="render()">
            <input type="text" id="n2" class="match-input" placeholder="TEAM B" oninput="render()">
        </div>
        <div class="extra-btns" id="test-ctrls">
            <button onclick="nextInn()">Switch Innings</button>
        </div>
    </div>
    <script>
        var m = {t1:{i1:{s:0,w:0,b:0},i2:{s:0,w:0,b:0}}, t2:{i1:{s:0,w:0,b:0},i2:{s:0,w:0,b:0}}};
        var curT = 1, curI = 1, mode = 'Test', fb = 0, hist = [], tick = [];
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function tossCoin() {
            var result = Math.random() < 0.5 ? "HEADS" : "TAILS";
            document.getElementById('toss-display').innerText = "Result: " + result;
        }
        function render() {
            var d = m['t'+curT]['i'+curI];
            var n1 = document.getElementById('n1').value || "Team A";
            var n2 = document.getElementById('n2').value || "Team B";
            document.getElementById('t1-btn').innerText = n1;
            document.getElementById('t2-btn').innerText = n2;
            document.getElementById('score-ui').innerText = d.s + '-' + d.w;
            document.getElementById('ovs-ui').innerText = 'Overs: ' + Math.floor(d.b/6) + '.' + (d.b%6);
            
            var head = document.getElementById('target-header');
            var rrr = document.getElementById('rrr-ui');
            var crr = document.getElementById('crr-ui');
            document.getElementById('test-ctrls').style.display = (mode === 'Test' ? 'flex' : 'none');

            if(mode === 'Test') {
                crr.innerText = ""; rrr.innerText = 'Inn ' + curI;
                var s1 = m.t1.i1.s + m.t1.i2.s;
                var s2 = m.t2.i1.s + m.t2.i2.s;
                if(fb === 0) head.innerText = "READY TO PLAY";
                else if(curI === 2 && curT !== fb) {
                    var target = (fb === 1 ? s1 : s2) + 1;
                    var current = (curT === 1 ? s1 : s2);
                    if(current >= target) head.innerText = (curT === 1 ? n1 : n2) + " WON! 🏆";
                    else if(d.w >= 10) head.innerText = (curT === 1 ? n2 : n1) + " WON! 🏆";
                    else head.innerText = "Target: " + target + " (Need " + (target - current) + ")";
                } else {
                    head.innerText = (s1 > s2) ? n1 + " leads by " + (s1-s2) : (s2 > s1) ? n2 + " leads by " + (s2-s1) : "Scores Level";
                }
            } else {
                var cVal = (d.b > 0 ? (d.s / (d.b / 6)) : 0).toFixed(2);
                crr.innerText = 'CRR: ' + cVal;
                var maxB = (mode === 'T20' ? 120 : 300);
                if(fb !== 0 && curT !== fb) {
                    var target = m['t'+fb].i1.s + 1;
                    if(d.s >= target) head.innerText = (curT === 1 ? n1 : n2) + " WON! 🏆";
                    else if(d.w >= 10 || d.b >= maxB) head.innerText = (curT === 1 ? n2 : n1) + " WON! 🏆";
                    else {
                        head.innerText = "Target: " + target;
                        rrr.innerText = 'RRR: ' + ((target - d.s) / ((maxB - d.b) / 6)).toFixed(2);
                    }
                } else {
                    head.innerText = mode + " Match";
                    rrr.innerText = 'Proj: ' + Math.round(cVal * (maxB / 6));
                }
            }
            var tDiv = document.getElementById('ticker-ui');
            tDiv.innerHTML = '';
            for(var i=0; i<tick.length; i++) {
                var v = document.createElement('div');
                v.className = 'ball' + (tick[i] === 'W' ? ' ball-w' : '');
                v.innerText = tick[i];
                tDiv.appendChild(v);
            }
        }
        function save() { hist.push(JSON.stringify({m:JSON.parse(JSON.stringify(m)), t:tick.slice(), fb:fb, ct:curT, ci:curI})); }
        function add(n) { save(); if(fb === 0) fb = curT; var d = m['t'+curT]['i'+curI]; d.s += n; d.b++; if(tick.length >= 6) tick = []; tick.push(n); render(); }
        function wicket() { save(); if(fb === 0) fb = curT; var d = m['t'+curT]['i'+curI]; d.w++; d.b++; if(tick.length >= 6) tick = []; tick.push('W'); render(); }
        function extra(type) { save(); if(fb === 0) fb = curT; var d = m['t'+curT]['i'+curI]; d.s += 1; if(type === 'BYE') d.b++; if(tick.length >= 6) tick = []; tick.push(type === 'WD' ? 'WD' : type[0]); render(); }
        function undo() { if(hist.length > 0) { var l = JSON.parse(hist.pop()); m = l.m; tick = l.t; fb = l.fb; curT = l.ct; curI = l.ci; render(); } }
        function setTeam(n) { curT = n; tick = []; render(); }
        function setMode(md) { mode = md; fb = 0; var spans = document.querySelectorAll('.top-links span'); for(var i=0; i<spans.length; i++) { spans[i].className = (spans[i].innerText === md ? 'active' : ''); } render(); }
        function nextInn() { if(confirm("Next Innings?")) { curI = (curI === 1 ? 2 : 1); tick = []; render(); } }
        function resetAll() { if(confirm("Reset Match?")) { location.reload(); } }
        render();
    </script>
</body>
</html>
